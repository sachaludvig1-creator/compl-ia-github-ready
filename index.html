<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO : titre et description de la page -->
  <title>Compl-IA — Pré-validation réglementaire IA pour marques cosmétiques</title>
  <meta name="description"
        content="Analysez vos contenus cosmétiques en quelques secondes face aux référentiels officiels CE 1223/2009, ARPP Beauté-Hygiène et DGCCRF. Pré-validation IA avant soumission au service juridique." />

  <!-- Favicon emoji -->
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>" />

  <!--
    ═══════════════════════════════════════════════
    CHARGEMENT DES FEUILLES DE STYLE
    Ordre important : variables → base → composants → écrans
    ═══════════════════════════════════════════════
  -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/screens.css" />
  <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
</head>

<body>

  <div class="global-privacy-banner" style="position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; height: 36px; display: flex; align-items: center; justify-content: center; background: #0F172A; color: white; font-size: 12px; font-weight: 500;">
    🔒 Chiffrement de bout en bout · Hébergement 100% EU · Conforme RGPD & EU AI Act
  </div>

  <!--
    ═══════════════════════════════════════
    CONTENEUR PRINCIPAL DE L'APPLICATION
    Le routeur SPA (app.js) injecte ici
    le HTML de l'écran actif.
    ═══════════════════════════════════════
  -->
  <div id="app" role="main">
    <!-- Contenu injecté dynamiquement par app.js -->
  </div>

  <!--
    ═══════════════════════════════════════
    CHARGEMENT DES SCRIPTS
    Ordre important :
      1. data.js    — données fictives (variables globales)
      2. api.js     — appel Anthropic Claude
      3. Écrans     — modules de rendu
      4. app.js     — routeur (chargé en dernier, lance l'app)
    ═══════════════════════════════════════
  -->

  <!-- Données fictives et constantes -->
  <script src="js/data.js"></script>

  <!-- Variables locales supprimées -->

  <!-- Base de connaissances -->
  <script src="src/data/knowledge_base.js"></script>

  <!-- Connexion API Anthropic Claude -->
  <script src="js/api.js"></script>

  <!-- Service Firebase Firestore -->
  <script src="js/firebase-service.js"></script>

  <!-- Modules d'écran (dans l'ordre de navigation) -->
  <script src="js/screens/login.js"></script>
  <script src="js/screens/dashboard.js"></script>
  <script src="js/screens/submission.js"></script>
  <script src="js/screens/results.js"></script>

  <!-- Routeur SPA — doit être chargé en dernier -->
  <script src="js/app.js"></script>

</body>
</html>
